<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to OneServ</title>
<link rel="icon" type="image/png" href="https://go.oneserv.app/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0f1e;
    color: #f8faff;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(26,86,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,86,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    max-width: 480px;
    width: 100%;
  }
  .logo {
    height: 64px;
    width: auto;
    margin-bottom: 40px;
  }
  .checkmark {
    width: 80px;
    height: 80px;
    background: rgba(58, 219, 118, 0.12);
    border: 2px solid rgba(58, 219, 118, 0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes pop {
    0%  { transform: scale(0.6); opacity: 0; }
    100%{ transform: scale(1);   opacity: 1; }
  }
  .checkmark svg { width: 36px; height: 36px; }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2.8rem;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 16px;
  }
  h1 span { color: #ff6b1a; }
  p {
    color: #9aa3b8;
    font-size: 1.05rem;
    line-height: 1.6;
    margin-bottom: 40px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #ff6b1a;
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 16px 36px;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,107,26,0.35);
    margin-bottom: 16px;
  }
  .btn:hover {
    background: #ff8c4a;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,107,26,0.5);
  }
  .redirect-note {
    font-size: 0.82rem;
    color: #5a6480;
  }
  .progress-bar {
    width: 200px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin: 12px auto 0;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #ff6b1a;
    border-radius: 2px;
    width: 0%;
    animation: fill 3s linear forwards;
  }
  @keyframes fill { to { width: 100%; } }
  .steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 32px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.92rem;
    color: #9aa3b8;
  }
  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(26,86,255,0.2);
    border: 1px solid rgba(26,86,255,0.3);
    color: #4f80ff;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  @media (max-width: 480px) {
    h1 { font-size: 2.2rem; }
  }
</style>
</head>
<body>
<div class="content">
  <img src="https://civsvilnbzdsnovhzsjf.supabase.co/storage/v1/object/public/brand/oneserv-logo.png"
       alt="OneServ" class="logo"
       onerror="this.style.display='none'">

  <div class="checkmark">
    <svg viewBox="0 0 36 36" fill="none">
      <path d="M7 18L15 26L29 10" stroke="#3adb76" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="30" stroke-dashoffset="30">
        <animate attributeName="stroke-dashoffset" from="30" to="0" dur="0.4s" begin="0.2s" fill="freeze"/>
      </path>
    </svg>
  </div>

  <h1>You're <span>In.</span></h1>
  <p>Your OneServ account is ready. We'll walk you through setup in about 5 minutes — then you're dispatching jobs.</p>

  <div class="steps">
    <div class="step"><div class="step-num">1</div>Set up your company info</div>
    <div class="step"><div class="step-num">2</div>Create your first job</div>
    <div class="step"><div class="step-num">3</div>You're running — explore the rest at your own pace</div>
  </div>

  <a href="https://oneserv.app" class="btn">
    Open OneServ →
  </a>

  <p class="redirect-note">Taking you there automatically…</p>
  <div class="progress-bar"><div class="progress-fill"></div></div>
</div>

<script>
  setTimeout(() => { window.location.href = 'https://oneserv.app'; }, 3000);
</script>
</body>
</html>
